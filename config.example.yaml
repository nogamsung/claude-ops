runtime:
  http_bind_addr: "127.0.0.1:8787"
  db_path: "data/agent.db"
  log_level: "info"
  tick_interval: "30s"
  worktree_root: ".worktrees"
  prompts_dir: "prompts"
  # GC removes worktrees for failed/cancelled tasks older than this many days.
  # Runs on boot and every 24h. 0 disables GC.
  worktree_retention_days: 7

limits:
  # Daily 上限. 0 이면 weekly_max_tasks 에서 자동 유도 (ceil(weekly/7)).
  # 둘 다 0 이면 무제한.
  daily_max_tasks: 5
  # Weekly 上限. 0 이면 daily_max_tasks * 7 로 자동 설정.
  weekly_max_tasks: 0
  # 주 시작 요일 — 카운터 리셋 기준 (mon|sun|...)
  week_starts_on: "mon"
  # 일/주 카운터 리셋 기준 타임존
  reset_tz: "Asia/Seoul"

scheduler:
  active_windows:
    - days: ["mon", "tue", "wed", "thu", "fri"]
      start: "09:00"
      end: "18:00"
      tz: "Asia/Seoul"
    - days: ["sat", "sun"]
      start: "10:00"
      end: "20:00"
      tz: "Asia/Seoul"

  # Cron-triggered maintenance tasks (optional).
  # Each task fires according to its cron spec but only within an active window.
  # Tasks count toward the global daily/weekly limit AND their own budget_sub_cap.
  maintenance_tasks: []
  # Example:
  # maintenance_tasks:
  #   - name: "daily-dep-update"
  #     cron: "0 2 * * *"                 # 02:00 every day (5-field standard cron)
  #     repo: "gs97ahn/example"           # must be in github.repos allowlist
  #     prompt_template: "maintenance/dep-update.tmpl"
  #     labels: ["chore", "maintenance"]
  #     budget_sub_cap:
  #       daily: 1
  #       weekly: 3
  #   - name: "weekly-security-scan"
  #     cron: "0 3 * * mon"
  #     repo: "gs97ahn/example"
  #     prompt_template: "maintenance/security-scan.tmpl"
  #     budget_sub_cap:
  #       weekly: 1

github:
  poll_interval: "60s"
  repos:
    - name: "gs97ahn/example"
      default_branch: "main"
      labels: ["claude-ops"]
      reviewers: ["gs97ahn"]
      checks:
        security: true
        perf: false
        # Post-task quality gate: commands run inside the task worktree after
        # Claude finishes but before a PR is opened. First failure aborts the
        # pipeline — PR is not created, worktree is preserved for inspection,
        # task is marked failed with the command output tail.
        # timeout applies per command (default 5m); SIGTERM → 5s → SIGKILL.
        commands:
          - "go build ./..."
          - "go test ./..."
          - "golangci-lint run ./..."
        timeout: "5m"

slack:
  channel_id: "C0XXXXXXX"
  mention_user_id: "U0XXXXXXX"
