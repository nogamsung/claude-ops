runtime:
  http_bind_addr: "127.0.0.1:8787"
  db_path: "data/agent.db"
  log_level: "info"
  tick_interval: "30s"
  worktree_root: ".worktrees"
  prompts_dir: "prompts"

limits:
  # Daily 上限. 0 이면 weekly_max_tasks 에서 자동 유도 (ceil(weekly/7)).
  # 둘 다 0 이면 무제한.
  daily_max_tasks: 5
  # Weekly 上限. 0 이면 daily_max_tasks * 7 로 자동 설정.
  weekly_max_tasks: 0
  # 주 시작 요일 — 카운터 리셋 기준 (mon|sun|...)
  week_starts_on: "mon"
  # 일/주 카운터 리셋 기준 타임존
  reset_tz: "Asia/Seoul"

scheduler:
  active_windows:
    - days: ["mon", "tue", "wed", "thu", "fri"]
      start: "09:00"
      end: "18:00"
      tz: "Asia/Seoul"
    - days: ["sat", "sun"]
      start: "10:00"
      end: "20:00"
      tz: "Asia/Seoul"

github:
  poll_interval: "60s"
  repos:
    - name: "gs97ahn/example"
      default_branch: "main"
      labels: ["claude-ops"]
      reviewers: ["gs97ahn"]
      checks:
        security: true
        perf: false

slack:
  channel_id: "C0XXXXXXX"
  mention_user_id: "U0XXXXXXX"
