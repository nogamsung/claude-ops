runtime:
  http_bind_addr: "127.0.0.1:8787"
  db_path: "data/agent.db"
  log_level: "info"
  tick_interval: "30s"
  worktree_root: ".worktrees"
  prompts_dir: "prompts"

scheduler:
  active_windows:
    - days: ["mon", "tue", "wed", "thu", "fri"]
      start: "09:00"
      end: "18:00"
      tz: "Asia/Seoul"
    - days: ["sat", "sun"]
      start: "10:00"
      end: "20:00"
      tz: "Asia/Seoul"

github:
  poll_interval: "60s"
  repos:
    - name: "gs97ahn/example"
      default_branch: "main"
      labels: ["claude-ops"]
      reviewers: ["gs97ahn"]
      checks:
        security: true
        perf: false

slack:
  channel_id: "C0XXXXXXX"
  mention_user_id: "U0XXXXXXX"
