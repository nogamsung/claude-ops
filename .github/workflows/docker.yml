name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry (true/false)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing via OIDC

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Metadata ────────────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nogamsung/claude-ops
          tags: |
            # push to main → :main + :sha-<short>
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            # tag push v*.*.* → semver set + :latest (non-prerelease only)
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=claude-ops
            org.opencontainers.image.description=Scheduled autonomous dev agent powered by Claude Code
            org.opencontainers.image.vendor=nogamsung
          annotations: |
            org.opencontainers.image.description=Scheduled autonomous dev agent powered by Claude Code

      # ── Build infrastructure ─────────────────────────────────────────────
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build args (ldflags 주입용) ────────────────────────────────────────
      - name: Compute build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # ── Build & Push ──────────────────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
          provenance: true
          sbom: true

      # ── Cosign keyless signing (sigstore) ────────────────────────────────
      - name: Install cosign
        if: github.event_name != 'workflow_dispatch' || inputs.push == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless via OIDC)
        if: github.event_name != 'workflow_dispatch' || inputs.push == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ghcr.io/nogamsung/claude-ops@${DIGEST}

      # ── SBOM upload ────────────────────────────────────────────────────────
      - name: Generate and upload SBOM
        if: github.event_name != 'workflow_dispatch' || inputs.push == 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/nogamsung/claude-ops@${{ steps.build.outputs.digest }}
          artifact-name: sbom-${{ github.sha }}.spdx.json
          output-file: sbom.spdx.json

      # ── Job summary ────────────────────────────────────────────────────────
      - name: Image digest summary
        if: always()
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
