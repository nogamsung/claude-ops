name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./...

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      # CGO_ENABLED=1 required: mattn/go-sqlite3 uses cgo
      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libsqlite3-dev

      - name: Run tests with race detector
        run: CGO_ENABLED=1 go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary (Job Summary)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}')
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Coverage | **${TOTAL}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: fgrosse/go-coverage-report@v1.2.0
        with:
          coverage-artifact-name: coverage-report
          coverage-file-name: coverage.out
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  build:
    name: Build Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libsqlite3-dev

      - name: Build all packages
        run: CGO_ENABLED=1 go build ./...

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o bin/scheduled-dev-agent \
            ./cmd/scheduled-dev-agent/
