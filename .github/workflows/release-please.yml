name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to (re-)publish to GHCR (e.g. v0.2.0). Skips release-please and runs only the publish job.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write  # cosign keyless signing via OIDC

jobs:
  release-please:
    name: Create / update release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build & Push Release Image
    needs: release-please
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      # ── Resolve tag/version metadata ─────────────────────────────────────
      # Works for both release-please push flow and manual workflow_dispatch
      # (re-publish an existing tag). GITHUB_TOKEN-created tags don't fire
      # workflow triggers, so dispatch is the escape hatch when a release
      # misses its publish run.
      - name: Resolve release metadata
        id: meta_vars
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          RP_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$RP_TAG"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag resolved (event=$EVENT)"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag (vX.Y.Z[-pre])"
            exit 1
          fi
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta_vars.outputs.tag }}

      # ── Metadata ────────────────────────────────────────────────────────────
      # Emit only `vX.Y.Z` + `latest` (stable releases). Re-running on an
      # existing tag simply overwrites the manifest — that's intentional.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          TAG: ${{ steps.meta_vars.outputs.tag }}
          VERSION: ${{ steps.meta_vars.outputs.version }}
          IS_PRERELEASE: ${{ steps.meta_vars.outputs.is_prerelease }}
        with:
          images: ghcr.io/nogamsung/claude-ops
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ env.IS_PRERELEASE == 'false' }}
          labels: |
            org.opencontainers.image.title=claude-ops
            org.opencontainers.image.description=Scheduled autonomous dev agent powered by Claude Code
            org.opencontainers.image.vendor=nogamsung
            org.opencontainers.image.version=${{ env.VERSION }}

      # ── Build infrastructure ─────────────────────────────────────────────
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # ── Build & Push ──────────────────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta_vars.outputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
          provenance: true
          sbom: true

      # ── Cosign keyless signing (sigstore) ────────────────────────────────
      - uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless via OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ghcr.io/nogamsung/claude-ops@${DIGEST}

      # ── SBOM upload ────────────────────────────────────────────────────────
      - name: Generate and upload SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/nogamsung/claude-ops@${{ steps.build.outputs.digest }}
          artifact-name: sbom-${{ steps.meta_vars.outputs.tag }}.spdx.json
          output-file: sbom.spdx.json

      # ── Append Docker pull info to the GitHub Release body ───────────────
      - name: Append Docker info to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta_vars.outputs.tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          CURRENT=$(gh release view "${TAG}" --json body -q .body)
          # Strip any previous Docker Image block so re-publish doesn't stack duplicates.
          CLEAN=$(printf '%s\n' "${CURRENT}" | awk '
            /^## Docker Image$/ { skip=1 }
            skip && /^## / && !/^## Docker Image$/ { skip=0 }
            !skip { print }
          ')
          {
            printf '%s\n' "${CLEAN}"
            echo ""
            echo "## Docker Image"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/nogamsung/claude-ops:${TAG}"
            echo "docker run -p 8787:8787 ghcr.io/nogamsung/claude-ops:${TAG}"
            echo '```'
            echo ""
            echo "**Image digest:** \`${DIGEST}\`"
          } > /tmp/release-body.md
          gh release edit "${TAG}" --notes-file /tmp/release-body.md

      # ── Job summary ────────────────────────────────────────────────────────
      - name: Image digest summary
        if: always()
        run: |
          echo "## Release Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.meta_vars.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
