name: Release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # release must not be cancelled mid-flight

permissions:
  contents: write  # create GitHub Release

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${{ contains(github.ref_name, '-') }}" >> $GITHUB_OUTPUT

      - name: Generate release notes from git log
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          IMAGE_TAG="ghcr.io/nogamsung/claude-ops:${{ steps.version.outputs.tag }}"
          {
            echo "notes<<EOF"
            echo "## Docker Image"
            echo ""
            echo "\`\`\`"
            echo "docker pull ${IMAGE_TAG}"
            echo "docker run -p 8787:8787 ${IMAGE_TAG}"
            echo "\`\`\`"
            echo ""
            echo "## What's Changed"
            echo ""
            echo "${COMMITS}"
            echo ""
            echo "---"
            echo "_Built from commit \`${{ github.sha }}\`_"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          make_latest: ${{ !contains(github.ref_name, '-') }}
