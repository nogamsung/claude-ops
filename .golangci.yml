run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: false
  goimports:
    local-prefixes: github.com/gs97ahn/scheduled-dev-agent
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - unparam
    - path: "db/sqlc/"
      linters:
        - all
    - path: "docs/"
      linters:
        - all
    - path: "mocks/"
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
